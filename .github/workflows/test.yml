name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR when a new commit lands.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint script
        run: bash -n ./tusc.sh

      - name: Run e2e test
        run: bash test/test.sh
